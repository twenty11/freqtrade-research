<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto Research Bot UI</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="container">
    <h1>Crypto Research Bot 控制台</h1>
    <p>通过前端页面调用 CLI 完成 validate / compile / backtest / evaluate / optimize / promote。</p>

    <section class="panel">
      <label>策略 JSON 路径
        <input id="strategy" value="templates/trend_spot.json" />
      </label>
      <label>Timerange（可选，格式 20240101-20240301）
        <input id="timerange" placeholder="20240101-20240301" />
      </label>
      <label>Hyperopt Epochs（仅 optimize）
        <input id="epochs" value="20" />
      </label>

      <div class="buttons">
        <button data-action="validate">Validate</button>
        <button data-action="compile">Compile</button>
        <button data-action="backtest">Backtest</button>
        <button data-action="evaluate">Evaluate</button>
        <button data-action="optimize">Optimize</button>
        <button data-action="promote">Promote</button>
      </div>
    </section>

    <section class="panel">
      <h2>执行结果</h2>
      <pre id="output">等待执行...</pre>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
